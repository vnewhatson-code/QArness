name: Test Installer
on: [push, pull_request]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install
      - name: Run unit tests
        run: bun test tests/unit/
      - name: Run integration tests (Docker)
        run: bun test tests/installer.test.ts
      - name: Validate install.sh syntax
        run: bash -n install.sh

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install
      - name: Run unit tests
        run: bun test tests/unit/
      - name: Verify TypeScript compiles
        run: bun build --no-bundle install.ts
      - name: Validate install.ps1 syntax
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile('.\install.ps1', [ref]$tokens, [ref]$errors)
          if ($errors.Count) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }
